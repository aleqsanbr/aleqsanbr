<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aleqsanbr / Projects & Support</title>
    <link rel="stylesheet" href="style.css" />
    <script src="utils/js-yaml.min.js"></script>
    <script src="i18n.js"></script>
  </head>
  <body>
    <div id="preloader" class="preloader">
      <div class="preloader-spinner"></div>
    </div>
    <div class="container" style="opacity: 0;">
      <header>
        <div class="header-top">
          <h1>aleqsanbr [:]</h1>
        </div>
        <p class="subtitle">{{header.subtitle}}</p>
        <div class="social-links" id="socialLinks"></div>
      </header>

      <section class="support">
        <div class="support-header">
          <div>
            <h2>{{support.title}}</h2>
            <p class="support-text">{{support.description}}</p>
          </div>
          <div class="meme-wrapper">
            <img src="icons/mew.jpg" />
          </div>
        </div>

        <div class="services-meme-wrapper">
          <div class="services-wrapper">
            <button class="yoomoney-btn" id="yoomoneyBtn">
              <svg viewBox="0 0 16 16" class="yoomoney-icon">
                <path d="M4.638 8.5a5.67 5.67 0 015.681-5.68A5.693 5.693 0 0116 8.5a5.693 5.693 0 01-5.68 5.682A5.67 5.67 0 014.637 8.5zm3.56 0c0 1.151.97 2.122 2.121 2.122 1.15 0 2.085-.97 2.121-2.121 0-1.15-.97-2.121-2.12-2.121-1.151 0-2.122.97-2.122 2.12zm-3.596 4.243v-8.27H0l2.589 8.27h2.013z" clip-rule="evenodd"></path>
              </svg>
              <span>{{support.yoomoney_button}}</span>
            </button>
          </div>
        </div>

        <div class="crypto-grid" id="cryptoGrid"></div>
      </section>

      <section class="projects">
        <h2>{{projects.title}}</h2>
        <div class="project-grid" id="projectGrid"></div>
      </section>

      <footer>
        <p>{{footer.text}}</p>
        <div class="language-selector">
          <button id="langButton" class="lang-button">🌐 <span id="currentLang">RU</span></button>
          <div id="langDropdown" class="lang-dropdown">
            <button data-lang="ru">🇷🇺 Русский</button>
            <button data-lang="en">🇬🇧 English</button>
          </div>
        </div>
      </footer>
    </div>

    <div class="qr-modal" id="qrModal">
      <div class="qr-content">
        <button class="qr-close">×</button>
        <img id="qrLogo" class="qr-crypto-logo" src="" alt="" />
        <div id="qrCode"></div>
        <p id="qrName" class="qr-name"></p>
        <p id="qrAddress" class="qr-address"></p>
      </div>
    </div>

    <div class="toast" id="copyToast"></div>

    <script src="utils/qrcode.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
